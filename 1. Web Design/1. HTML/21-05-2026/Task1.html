<!-- Calculator Layout -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin-top: 50px;
        }

        table {
            border-collapse: collapse;
            width: 300px;
        }

        td {
            border: 1px solid #000;
            padding: 20px;
            text-align: center;
            font-size: 18px;
        }

        td[colspan="4"] {
            font-size: 24px;
            background-color: #f0f0f0;
        }
    </style>
</head>

<body>
    <font size="52px" color="black">Calculator</font>
    <hr>
    <br>

    <table>
        <tr>
            <td colspan="4" style="text-align: right;font-size:32px;">0</td>
        </tr>
        <tr>
            <td>%</td>
            <td>CE</td>
            <td>C</td>
            <td>←</td>
        </tr>
        <tr>
            <td>1/x</td>
            <td>x²</td>
            <td>√x</td>
            <td>/</td>
        </tr>
        <tr>
            <td>7</td>
            <td>8</td>
            <td>9</td>
            <td>*</td>
        </tr>
        <tr>
            <td>4</td>
            <td>5</td>
            <td>6</td>
            <td>-</td>
        </tr>
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td>+</td>
        </tr>
        <tr>
            <td>+/-</td>
            <td>0</td>
            <td>.</td>
            <td>=</td>
        </tr>
    </table>
</body>

</html>
