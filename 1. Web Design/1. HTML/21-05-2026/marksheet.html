<!-- Marksheet -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marksheet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        table {
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <font size="52px" face="Arial" color="black">
        Marksheet
    </font>
    <table>
        <tr>
            <th rowspan="2">Subject Code</th>
            <th rowspan="2">Subject Name</th>
            <th colspan="2">Marks</th>
            <th rowspan="2">Grade</th>
        </tr>
        <tr>
            <th>Obtained</th>
            <th>Maximum</th>
        </tr>
        <tr>
            <td>CE401</td>
            <td>Data Structures</td>
            <td>88</td>
            <td>100</td>
            <td>A</td>
        </tr>
        <tr>
            <td>CE402</td>
            <td>Database Systems</td>
            <td>92</td>
            <td>100</td>
            <td>A+</td>
        </tr>
        <tr>
            <td>CE403</td>
            <td>Operating Systems</td>
            <td>85</td>
            <td>100</td>
            <td>A</td>
        </tr>
        <tr>
            <td>CE404</td>
            <td>Computer Networks</td>
            <td>90</td>
            <td>100</td>
            <td>A+</td>
        </tr>
        <tr>
            <td>CE405</td>
            <td>Software Engineering</td>
            <td>87</td>
            <td>100</td>
            <td>A</td>
        </tr>
    </table>

</body>
</html>
