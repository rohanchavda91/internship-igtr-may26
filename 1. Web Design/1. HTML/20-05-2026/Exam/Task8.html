<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complex Table</title>
    <style>
        table{
            border-collapse:collapse;
            border: 1px solid black;
            width: 1000px; height:500px;
        }
        th, td{
            border: 1px solid black;
            text-align: center;
            padding:5px;
        }
    </style>
</head>
<body>
    <font size="52px" color="black">Task-8: Complex Table</font> <hr>

        </tr>

            <th>To</th>
            <th>S.No.</th>
            <th>Service ID No.:</th>
            <th>Gap in Service (in days)</th>

</body>
</html>
