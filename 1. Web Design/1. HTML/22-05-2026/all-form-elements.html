<!-- Demonstration of form elements -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table{
            border:3px solid black;
            border-collapse: collapse;
            width:500px;
        }
        th, td{
            border:1px solid black;
            padding:10px;
            text-align:center;
        }
    </style>
</head>

<body>
    <font size="52px" face="Roboto">Form Elements</font>
    <hr>
    <table>
        <tr>
            <th>Element</th>
            <th>Example</th>
        </tr>
        <tr>
            <td>Text Input</td>
            <td><input type="text"></td>
        </tr>
        <tr>
            <td>Email Input</td>
            <td><input type="email"></td>
        </tr>
        <tr>
            <td>Phone Number Input</td>
            <td><input type="tel" maxlength="10"></td>
        </tr>
        <tr>
            <td>Radio Buttons</td>
            <td>
                <input type="radio" name="gender" value="male" default> Male
                <input type="radio" name="gender" value="female"> Female
            </td>
        </tr>
        <tr>
            <td>Checkboxes</td>
            <td>
                <input type="checkbox" name="hobby" value="reading"> Reading
                <input type="checkbox" name="hobby" value="traveling"> Traveling
            </td>
        </tr>
        <tr>
            <td>Dropdown</td>
            <td>
                <select>
                    <option> -- select --</option>
                    <option>New York</option>
                    <option>London</option>
                    <option>Tokyo</option>
                </select>
            </td>
        </tr>
        <tr>
            <td></td>
            <td></td>
        </tr>
    </table>
</body>

</html>
