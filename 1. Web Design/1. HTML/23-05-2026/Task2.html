<!-- Form-2: Registration Form -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        * {
            font-family:'Roboto', 'Calibri', Sans-serif;
        }
    </style>
</head>

<body>
    <fieldset style="width: 300px;">
        <legend>Registration Form</legend>
        <h1> Register </h1>
        <form>
            <label for="fname">First Name</label><br>
            <input type="text" id="fname" name="fname">
            <br><br>
            <label for="lname">Last Name</label><br>
            <input type="text" id="lname" name="lname">
            <br><br>
            <label for="email">Email</label><br>
            <input type="email" id="email" name="email">
            <br><br>
            <label for="password">Password</label><br>
            <input type="password" id="password" name="password" placeholder="Must be at least 8 characters"
                Minlength="8">
            <br><br>
            <input type="submit" value="Register"
                style="background-color:blue; color:white; border-radius: 15px; height:30px; width:75px; border:none;">
        </form>
    </fieldset>
</body>

</html>
