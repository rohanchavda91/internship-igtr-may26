<!-- Form-9: Student Registration Form -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <style>
        * {
            font-family: 'Roboto', 'Calibri', Sans-serif;
        }

        #dob {
            width: 40px;
        }

        #mob {
            width: 40px;
        }

        #yob {
            width: 60px;
        }

        table {
            width: 500px;
            border-spacing: 10px;
        }

        th,
        td {
            padding-left: 20px;
        }

        .a {
            width: 100%;
        }

        .b {
            width: 45%;
        }
    </style>
</head>

<body>
    <fieldset style="width: 550px; margin: auto; margin-top: 50px; background-color:pink;">
        <form>
            <table>
                <tr>
                    <th colspan="2">
                        <font size="6">
                            <center>Student Registration Form</center>
                        </font>
                    </th>
                </tr>
                <tr>
                    <td><label for="rollNo">Roll No.:</label></td>
                    <td><input type="text" id="rollNo" name="rollNo" class="a"></td>
                </tr>
                <tr>
                    <td><label for="sfname">Student Name:</label></td>
                    <td><input type="text" id="sfname" name="sfname" placeholder="First Name"
                            class="b">&nbsp;-&nbsp;<input type="text" id="slname" name="slname" placeholder="Last Name"
                            class="b"></td>
                </tr>
                <tr>
                    <td><label for="FFname">Father's Name:</label></td>
                    <td><input type="text" id="FFname" name="FFname" placeholder="Father's Name" class="a"></td>
                </tr>
                <tr>
                    <td><label>Date of Birth:</label></td>
                    <td>
                        <input type="number" id="dob" name="dob" maxlength="2" max="31" min="1" placeholder="Day">
                        &nbsp;-&nbsp;
                        <input type="number" id="mob" name="mob" maxlength="2" max="12" min="1" placeholder="Month">
                        &nbsp;-&nbsp;
                        <input type="number" id="yob" name="yob" maxlength="4" max="2026" min="1900" placeholder="Year">
                        &nbsp; (DD-MM-YYYY)
                    </td>
                </tr>
                <tr>
                    <td><label for="mobile">Mobile No.:</label></td>
                    <td>
                        <input type="text" maxlength="4" value="+91" style="width:40px;">
                        &nbsp; - &nbsp;
                        <input type="number" id="mobile" name="mobile" placeholder="Mobile Number" style="width:200px;">
                    </td>
                </tr>
                <tr>
                    <td><label for="email">Email:</label></td>
                    <td><input type="email" id="email" name="email" class="a"></td>
                </tr>
                <tr>
                    <td><label for="pwd">Password:</label></td>
                    <td><input type="password" id="pwd" name="pwd" class="a"></td>
                </tr>
                <tr>
                    <td><label for="gender">Gender:</label></td>
                    <td>
                        <input type="radio" id="male" name="gender" value="male" checked>
                        <label for="male">Male</label>
                        <input type="radio" id="female" name="gender" value="female">
                        <label for="female">Female</label>
                    </td>
                </tr>
                <tr>
                    <td><label for="department">Department:</label></td>
                    <td>
                        <input type="checkbox" id="cse" name="department" value="CSE">
                        <label for="cse">CSE</label>
                        <input type="checkbox" id="it" name="department" value="IT">
                        <label for="it">IT</label>
                        <input type="checkbox" id="ece" name="department" value="ECE">
                        <label for="ece">ECE</label>
                        <input type="checkbox" id="civil" name="department" value="Civil">
                        <label for="civil">Civil</label>
                        <input type="checkbox" id="mech" name="department" value="Mech">
                        <label for="mech">Mech</label>
                    </td>
                </tr>
                <tr>
                    <td><label for="course">Course:</label></td>
                    <td>
                        <select id="course" name="course">
                            <option value="">-- Select --</option>
                            <option value="B.Tech">B.Tech</option>
                            <option value="M.Tech">M.Tech</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td><label for="photo">Student Photo:</label></td>
                    <td><input type="file" id="photo" name="photo" accept=".jpg, .png"></td>
                </tr>
                <tr>
                    <td><label for="city">City:</label></td>
                    <td><input type="text" id="city" name="city"></td>
                </tr>
                <tr>
                    <td><label for="address">Address:</label></td>
                    <td><textarea id="address" name="address" rows="4" cols="30"></textarea></td>
                </tr>
                <tr>
                    <td></td>
                    <td>
                        <center><input type="submit" value="Register"></center>
                    </td>
                </tr>
            </table>
        </form>
    </fieldset>
</body>

</html>
