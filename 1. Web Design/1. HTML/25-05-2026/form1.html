<!-- Form-1: Holiday Request Form -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holiday Requrest</title>
    <style>
        * {
            font-family: 'Roboto', 'Calibri', Sans-serif;
        }
        fieldset {
            width: 600px;
        }
        .name{
            width:45%;
        }
        .x{
            border:black solid 1px;
            background-color:white;
            color:black;
        }
        .y{
            border:white solid 1px;
            background-color:black;
            color:white;
        }
        .x, .y{
            height:35px;width:75px;
        }
    </style>
</head>
<body>
    <fieldset>
        <form>
            <h1>Holiday Request Form</h1><hr>
            <h4>Fill the form below with your holiday request details.</h4><br>
            <label>Name</label><br>
            <input type="text" id="fname" name="fname" placeholder="First Name" maxlength="15" class="name"> &nbsp;&nbsp;
            <input type="text" id="lname" name="lname" placeholder="Last Name" maxlength="15" class="name"><br><br>
            <label for="email">Email</label><br>
            <input type="email" id="email" name="email" placeholder="Email"><br><br>
            <label for="contact">Select contact to approve your request.</label><br>
            <select id="contact" name="contact">
                <option value="">-- Select --</option>
                <option value="manager">Manager</option>
                <option value="hr">HR</option>
                <option value="teamlead">Team Lead</option>
            </select><br><br>
            <table>
                <tr>
                    <td><label for="start">Start Date</label></td>
                    <td><label for="end">End Date</label></td>
                </tr>
                <tr>
                    <td><input type="date" id="start" name="start"></td>
                    <td><input type="date" id="end" name="end"></td>
                </tr>
            </table> <br>
            <input type="reset" class="x"> &nbsp;
            <input type="submit" value="Send" class="y">
            
        </form>
    </fieldset>
</body>
</html>
