<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradients Example</title>
    <style>
        * {
            font-family: 'noto color emoji', 'roboto', sans-serif;
            font-size: 54px;
            margin-left: 20px;

        #main {

            background-image: radial-gradient(circle at center, rgb(255, 255, 100) 20%, transparent 80%);

            display: flex;
            align-items: center;
        }
    </style>
</head>

<body>
    <br>
    <div id="main">
        💡

</body>

</html>
