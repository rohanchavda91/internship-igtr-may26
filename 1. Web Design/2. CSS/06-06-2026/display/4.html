<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        * {
            font-family: 'Calibri', 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            margin-left: 10px;
        }

        h1 {
            margin-top: 20px;
        }

        hr {
            width: 50%;
            border: 1px solid;
        }
    </style>
</head>

<body>
    <h1>Image Gallery</h1>
    <hr>
    <div class="image-card">
        <img src="nibbles.png" alt="Nibbles" height="100px" width="100px">
        <p>Nibbles</p>
    </div>
    <div class="image-card">
        <img src="nibbles.gif" alt="Nibbles" height="100px" width="100px">
        <p>Nibbles</p>
    </div>
    <div class="image-card">
        <img src="nibbles.gif" alt="Nibbles" height="100px" width="100px">
        <p>Nibbles</p>
    </div>
</body>

</html>
