<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box</title>
    <style>
        * {
            margin: 10px;
            height: 100vh;
            width: 100vw;
        }

        body {
            height: 100vh;
            width: 100vw;
        }

        div#mainbox {
            width: 100%;
            height: 100%;
            position: relative;
            margin: auto;
            display: inline-block;
        }

        div#box {
            width: 200px;
            height: 200px;
            background-color: red;
            animation-name: chakkar;
            animation-duration: 5s;
            animation-iteration-count: infinite;
            position: inherit;

        }

        @keyframes chakkar {
            0% {
                background-color: red;
                top: 0%;
                left: 0%;
            }

            25% {
                background-color: green;
                top: 0%;
                left: 90%;
            }

            50% {
                background-color: yellow;
                top: 90%;
                left: 90%;
            }

            75% {
                background-color: blue;
                top: 90%;
                left: 0%;
            }

            100% {
                background-color: red;
                top: 0%;
                left: 0%;
            }
        }
    </style>
</head>

<body>
    <div id="mainbox">
        <div id="box">

        </div>
    </div>
</body>

</html>
