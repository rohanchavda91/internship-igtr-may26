<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login signup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #3c436d;
        }

        .wrapper {
            perspective: 1200px;
            text-align: center;
        }

        .wrapper h2 {
            color: white;
            margin-bottom: 20px;
        }

        .tabs {
            margin-bottom: 20px;
        }

        .tabs a {
            text-decoration: none;
            color: #dcdcdc;
            margin: 0 20px;
            font-size: 14px;
        }

        .card {
            width: 320px;
            height: 280px;
            position: relative;

            transform-style: preserve-3d;
            transition: 1s;
        }

        /* :target magic */
        #signup:target~.wrapper .card {
            transform: rotateY(180deg);
        }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 5px;

            display: flex;
            justify-content: center;
            align-items: center;

            backface-visibility: hidden;

            box-shadow: 0 10px 25px rgba(0, 0, 0, .25);
        }

        .signup {
            transform: rotateY(180deg);
        }

        form {
            width: 80%;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            padding: 10px 25px;
            border: none;
            border-radius: 20px;
            background: #9acd32;
            color: white;
            cursor: pointer;
        }


        .wrapper::before {
            content: "";
            position: absolute;

            width: 320px;
            height: 280px;

            background: rgba(255, 255, 255, .18);

            transform:
                translate(30px, 20px) rotateY(-25deg);

            z-index: -1;
        }
    </style>
</head>

<body>

    <div id="signup"></div>

    <div class="wrapper">

        <h2>Animated Forms</h2>

        <div class="tabs">
            <a href="#">LOGIN</a>
            <a href="#signup">SIGN UP</a>
        </div>

        <div class="card">

            <div class="face login">
                <form>
                    <input type="email" placeholder="Email">
                    <input type="password" placeholder="Password">
                    <button>Login</button>
                </form>
            </div>

            <div class="face signup">
                <form>
                    <input type="text" placeholder="Name">
                    <input type="email" placeholder="Email">
                    <input type="password" placeholder="Password">
                    <button>Sign Up</button>
                </form>
            </div>

        </div>

    </div>

</body>

</html>
