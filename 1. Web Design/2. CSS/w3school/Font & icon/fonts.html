<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+AU+VIC+Guides&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+GB+J:ital,wght@0,100..400;1,100..400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">

        p.a{

        }
        p.b{
            font-family: "Playwrite GB J", cursive;

        }
        p.c{
            font-family: "Black Ops One", system-ui;

            font-style: normal;
        }
        p.d{
            font-family: "Dancing Script", cursive;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
        }
        p.e{
            font-family: "Titillium Web", sans-serif;
            font-weight: 400;
            font-style: normal;
        }

</head>
<body>
    <p class="a">Hello!! This is google fonts</p>
    <p class="b">Hello!! This is google fonts</p>

</html>
