<!-- Form-4: Within Table -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table{
            width: 300px;
            height: auto;
        }
        table, th, td{
                border: 1px solid black;
        }
        th,td{
            padding: 5px;
            font-family:'Roboto', 'Calibri', Sans-serif;
        }
        th{
            text-align: center;
            font-size: 20px;
        }


    </style>
</head>
<body>
    <table>
        <tr>
            <th colspan="2">Fill the Form Below</th>
        </tr>
        <tr>
            <td>Name: </td>
            <td><input type="text" name="name" id="name"></td>
        </tr>
        <tr>
            <td>Password: </td>
            <td><input type="password" name="password" id="password"></td>
        </tr>
        <tr>
            <td>Feedback: </td>
            <td><textarea name="feedback" id="feedback"></textarea></td>
        </tr>
        <tr>
            <td>Gender: </td>
            <td>
                <input type="radio" name="gender" id="male" value="male" default>
                <label for="male">Male</label>
                <input type="radio" name="gender" id="female" value="female">
                <label for="female">Female</label>
            </td>
        </tr>
        <tr>
            <td>Subjects: </td>
            <td>
                <input type="checkbox" name="sub" id="Web" value="Web">
                <label for="Web">Web Design</label>
                <input type="checkbox" name="sub" id="Maths" value="Maths">
                <label for="Maths">Maths</label>
                <input type="checkbox" name="sub" id="Graphics" value="Graphics">
                <label for="Graphics">Graphics</label>
                <input type="checkbox" name="sub" id="English" value="English">
                <label for="English">English</label>
            </td>
        </tr>
        <tr>
            <td></td>
            <td><input type="reset" value="Reset All"><input type="submit" value="Submit All Details"></td>
        </tr>
    </table>
</body>
</html>
