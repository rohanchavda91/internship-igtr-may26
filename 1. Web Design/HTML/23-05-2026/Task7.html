<!-- Form-7: Basic HTML Form -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Form</title>
    <style>
        * {
            font-family: 'Roboto', 'Calibri', Sans-serif;
        }
        fieldset{
            width: 400px;
            padding:20px;
        }
    </style>
</head>

<body>

    <h1>Basic HTML Form</h1>

    <form>
        <fieldset>
            <legend>Name</legend>
            <label for="fname">First Name: </label>
            <input type="text" id="fname" name="fname"><br><br>
            <label for="lname">Last Name: </label>
            <input type="text" id="lname" name="lname"><br><br>
        </fieldset>
        <br>
        <fieldset>
            <legend>Other Questions</legend>
            <label for="r">Choose a Drink: </label> <br>
            <input type="radio" id="r1" name="drink" value="tea">
            <label for="r1">Tea</label><br>
            <input type="radio" id="r2" name="drink" value="coffee" checked>
            <label for="r2">Coffee</label><br>
            <input type="radio" id="r3" name="drink" value="choco">
            <label for="r3">Hot Chocolate</label><br><br>

            <label for="c"> Which IScream do you like?</label><br>
            <input type="checkbox" id="c1" name="icecream" value="Choco">
            <label for="c1">Chocolate</label><br>
            <input type="checkbox" id="c2" name="icecream" value="ChocoPud">
            <label for="c2">Chocolate Pudding</label><br>
            <input type="checkbox" id="c3" name="icecream" value="ChocoPeanBut" checked>
            <label for="c3">Chocolate Peanut Butter</label><br>
            <input type="checkbox" id="c4" name="icecream" value="Vanilla">
            <label for="c4">Vanilla</label><br>
            <input type="checkbox" id="c5" name="icecream" value="Strawberry">
            <label for="c5">Strawberry</label><br><br>

            <label for="s">Choose a school: </label>
            <select id="s" name="school">
                <option value="">--Select--</option>
                <option value="Virani">Virani</option>
                <option value="G.T. Sheth">G.T. Sheth</option>
                <option value="Modi">Modi</option>
            </select><br><br>

            <label for="comm"> Please provide comments: </label>
            <textarea id="comm" name="comments"></textarea><br><br>
        </fieldset>

        <br>
        <input type="submit" value="Submit">
    </form>
</body>

</html>
