<!-- Form-5: Another Registration Form -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        * {
            font-family: 'Roboto', 'Calibri', Sans-serif;
        }

        table {
            width: 400px;
            height: auto;
            border-spacing: 2px;
        }

        td {
            padding: 5px;
        }
    </style>
</head>

<body>
    <center>
        <h2>Registration Form</h2>
        <form>
            <table>
                <tr>
                    <td>Id: </td>
                    <td><input type="text"> </td>
                </tr>
                <tr>
                    <td>Name: </td>
                    <td><input type="text" id="name"></td>
                </tr>
                <tr>
                    <td>Course: </td>
                    <td><input type="text" id="course"> </td>
                </tr>
                <tr>
                    <td>Branch: </td>
                    <td><input type="text" id="branch"></td>
                </tr>
                <tr>
                    <td>Roll No: </td>
                    <td><input type="text" id="rollno"></td>
                </tr>
                <tr>
                    <td>Email Address: </td>
                    <td><input type="email" id="email"></td>
                </tr>
                <tr>
                    <td>Username: </td>
                    <td><input type="text" id="uname"></td>
                </tr>
                <tr>
                    <td>About Us: </td>
                    <td><textarea name="aboutus" id="aboutus"></textarea></td>
                </tr>
                <tr>
                    <td>Password: </td>
                    <td><input type="password" id="pwd"></td>
                </tr>
            </table>
            <input type="submit" value="Add">
        </form>
    </center>
</body>

</html>
