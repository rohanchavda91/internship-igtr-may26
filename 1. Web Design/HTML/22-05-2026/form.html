<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Form</title>
</head>
<body>
    <font size="52px" face="Roboto" style="font-style:bold;">Basic Form</font> <hr>
    <fieldset style="width:750px; height:auto;">
        <legend>Sample Registration Form</legend>
        <label>First Name: </label> <input type="text"> <br>
        <label>Last Name: </label> <input type="text"> <br>
        <label>Email: </label> <input type="email"> <br>
        <label>Phone Number: </label> <input type="tel" maxlength="10"> <br>
        <label>Gender: </label> <input type="radio" name="gender" value="male" checked> Male
        <input type="radio" name="gender" value="female"> Female
        <input type="radio" name="gender" value="other" disabled> Rather not to say <br>
        <label>Hobbies: </label>
        <label>City: </label>
            <select>
                <option> -- select --</option>
                <option>New York</option>
                <option>London</option>
                <option>Tokyo</option>
            </select> <br>

        <input type="submit" value="Submit"> <input type="reset" value="Reset">

    </fieldset>
</body>
</html>
