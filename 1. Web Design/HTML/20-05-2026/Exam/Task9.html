<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Designed Table</title>
    <style>
        table{
            border:1px solid black;
            background-color:antiquewhite;
        }
        th,td{
            border:1px solid;
            padding:10px;
        }
        th{
            background-color:maroon;
            color: white;
        }
        td{
            background-color:lightcoral;
        }

    </style>
</head>
<body>
    <font size="52px" color="black">Task-9: HTML Code to Design Table</font> <hr>
    <H1>Basic Course</H1>
    <table>
        <tr>
            <th>Sr. No.</th>
            <th>Course Name</th>
            <th>Fees</th>
            <th>Duration</th>
            <th>Eligibility</th>
        </tr>
        <tr>
            <td>1</td>
            <td>CCC - Course on Computer Concept</td>
            <td>2000</td>
            <td>3 Months</td>
            <td>10<sup>th</sup></td>
        </tr>
        <tr>
            <td>2</td>
            <td>CCA - Course on Computer Application</td>
            <td>2000</td>
            <td>3 Months</td>
            <td>10<sup>th</sup></td>
        </tr>
        <tr>
            <td>3</td>
            <td>Tally</td>
            <td>3000</td>
            <td>3 Months</td>
            <td>10<sup>th</sup></td>
        </tr>
        <tr>
            <td>4</td>
            <td>O Level</td>
            <td>15,000</td>
            <td>1 Year</td>
            <td>12<sup>th</sup></td>
        </tr>
    </table>
</body>
</html>
